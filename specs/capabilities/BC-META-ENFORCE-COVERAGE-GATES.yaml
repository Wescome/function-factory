explicitness: explicit
rationale: >
  This Capability is the transfer function — in the control-theoretic framing
  of whitepaper §2 — that converts the sixth non-negotiable forcing condition
  (PRS-META-THREE-COVERAGE-GATES) into operational machinery. The Capability
  name and purpose are explicit in the factory-meta skill rule #4 and in the
  whitepaper §6 specification of each gate's role. The Capability yields
  three control-type FunctionProposals immediately (one per gate); additional
  evidence-type proposals (e.g., a Coverage-Report-indexing Function) may
  surface in downstream Stage 4 analysis but are not required in v1 because
  the evidence aspect is bundled into each gate's own control Function
  (Coverage Report emission). Gate 1 is the first of the three to instantiate
  during Bootstrap per ConOps §2.3 Bootstrap context- it is a precondition for
  every subsequent Factory stage against any PRD, including the PRDs that
  specify Gates 2 and 3.
