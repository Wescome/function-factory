id: BC-META-HARNESS-EXECUTE
source_refs:
  - PRS-META-HARNESS-EXECUTE
  - SIG-META-WHITEPAPER-V4
explicitness: explicit
rationale: >
  The Capability that closes PRS-META-HARNESS-EXECUTE. Stated narrowly
  at the business-capability layer — "execute a Factory-compiled
  WorkGraph via a named harness adapter" — so the Capability remains
  well-formed even as the adapter pool grows beyond the initial
  single-adapter case. Multi-adapter dispatch, per-node runtime
  selection, and cross-WorkGraph execution coordination are all
  plausible future Functions derivable from this same Capability in
  subsequent iterations. This is the first execution Capability the
  Factory has authored at Stage 6 and is the architectural peer of
  Stage 5's BC-META-COMPILE-PRD-TO-WORKGRAPH.

statement: >
  The Factory shall consume a WorkGraph emitted by Stage 5, dispatch
  its nodes to a named runtime adapter in the adapter's expected
  execution order, record per-node execution outcomes as structured
  telemetry, and return a summary artifact citing the source
  WorkGraph, the adapter used, and the observed outcomes.

owner: factory_runtime
confidence: 0.85
