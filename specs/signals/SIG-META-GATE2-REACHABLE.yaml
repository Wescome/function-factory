observation: >
  Stage 6 (function synthesis) produces code, tests, and evidence artifacts
  (Stage6TraceLog, CandidateSelectionReport, Gate2Input). Gate 2 is
  specified in whitepaper §6.3 as the Simulation Coverage Gate that runs
  before a Function transitions from 'implemented' to 'verified'. The
  Gate2Input schema exists (ratified-decisions.md lines 488-528). The
  evidence Function emits Gate2Input bundles. But no Gate 2 evaluator
  exists to consume them. Every Function produced by Stage 6 is stuck at
  lifecycle state 'implemented' indefinitely — the same pattern that
  motivated the FUNCTION-SYNTHESIS Pressure, one stage downstream.

  Whitepaper §11 non-negotiable #6: "A Factory without Gate 2 promotes
  Functions to monitored before their scenarios cover their invariants."
  Gate 2 must exist in v1. It is now reachable (Stage 6 produces its
  input) and therefore its absence is an active gap, not a deferred one.
