rationale: >
  Stage 1 Signal (source_refs empty per lineage-preservation §"Stage 1
  Signal exception" — Signals cite external origin in source field).
  The Factory's own operational state is the signal source: Stage 6
  function synthesis now produces code (commit 80baaeb, five-role topology
  via pi-ai, Verifier PASS), but Gate 2 (simulation/acceptance coverage)
  has no evaluator. The packages/coverage-gates/ package implements Gate 1
  only. The packages/assurance-graph/ package is an empty stub.

  This is the first Signal the Factory generates about itself from its own
  operational state — not from the whitepaper, not from an architect
  correction, but from the observation that Stage 6 output has nowhere
  to go. The closed loop (Stage 7 → Stage 1) is functioning: the Factory
  detected a gap in its own pipeline and is producing a Signal about it.

