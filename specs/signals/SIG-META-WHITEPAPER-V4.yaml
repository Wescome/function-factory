title: Function Factory whitepaper v4 declares six non-negotiable design choices
description: >
  Whitepaper §11 enumerates six non-negotiable design choices for any first
  build of the Factory. The sixth — "The three Coverage Gates, fail-closed" —
  is elaborated in §6 (Spec Coverage and the Three Gates). §6.2 specifies
  Gate 1 (the Compile Coverage Gate) in full- it runs between Pass 7
  (consistency_check) and Pass 8 (assemble_workgraph) of the Stage 5 compiler,
  computes four coverage checks (atom, invariant, validation, dependency
  closure), fails closed on any miss, and emits a lineage-preserving Coverage
  Report regardless of verdict. A Factory missing Gate 1 generates WorkGraphs
  from incomplete specifications; the whitepaper treats this as categorically
  different from the Factory it describes.
