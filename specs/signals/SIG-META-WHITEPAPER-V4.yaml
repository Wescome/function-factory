rationale: >
  Stage 1 Signal with no upstream Factory artifact by category. The signal's
  origin is the external file cited in `source` (the whitepaper markdown in
  Dropbox). An empty `source_refs` array is semantically correct for Stage 1
  Signals — they are the upstream origin point of the pipeline by definition,
  and the whitepaper's role as upstream is cited in `source` rather than in
  `source_refs` because it is not itself a Factory artifact. Note- the
  lineage-preservation skill's anti-pattern #1 ("Empty source_refs. Never.")
  does not currently carve out an exception for Stage 1 Signals. A skill
  amendment proposing that exception should be authored in a subsequent
  DECISIONS.md entry- the skill was written with downstream artifacts in mind
  and Signals are the correct asymmetric case. This Signal is the first
  authored under the Factory's own discipline during Bootstrap and produces
  the PRS-META-THREE-COVERAGE-GATES Pressure immediately downstream.
