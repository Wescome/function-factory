id: FP-META-HARNESS-EXECUTE
source_refs:
  - BC-META-HARNESS-EXECUTE
  - PRS-META-HARNESS-EXECUTE
  - SIG-META-WHITEPAPER-V4
explicitness: explicit
rationale: >
  First Function derived from BC-META-HARNESS-EXECUTE. Scoped
  deliberately- execute a single WorkGraph via a single named adapter,
  emit a summary artifact. Multi-adapter dispatch is a separate
  Function. Cross-WorkGraph coordination is a separate Function.
  Per-node retry/fallback is a separate Function. This is an execution
  Function per whitepaper §3.2 — structurally the Stage-6 peer of
  Pass 8 (Stage 5's execution Function); the shared ExecutionFunction
  shape documented in PRD-META-COMPILER-PASS-8 applies unchanged.

  One design choice worth naming in rationale- the Function is
  scoped to execute, not to validate. Pre-execution validation of the
  input WorkGraph is assumed to have happened upstream at Gate 1 and
  at Pass 8's defensive schema check; harness_execute trusts that its
  WorkGraph input is schema-conformant and Gate-1-cleared. A WorkGraph
  arriving from a non-Factory source would need an upstream validation
  pass before reaching this Function.

capabilityId: BC-META-HARNESS-EXECUTE
name: harness_execute
purpose: >
  Dispatch the nodes of a WorkGraph to a named harness adapter in the
  adapter's expected execution order, record per-node outcomes, and
  emit a summary artifact to specs/execution-logs/.
functionType: execution

expectedInputs:
  - WorkGraph to execute (typically read from specs/workgraphs/WG-*.yaml)
  - HarnessAdapter identifier (e.g., "claude-code", "cursor", "dry-run") selecting the runtime dispatch strategy
  - Optional adapter-specific configuration (credentials, workspace path, timeout policy) passed opaquely to the adapter

expectedOutputs:
  - ExecutionLog artifact written to specs/execution-logs/EL-<WorkGraph-ID>-<timestamp>.yaml
  - Per-node execution status (completed | failed | skipped) captured in the ExecutionLog
  - Function lifecycle transition hint (designed → in_progress → verified) emitted as a separate artifact when the execution outcome is unambiguous; Stage 7 owns the actual transition decision

governingConstraints:
  - Fail-closed at the adapter boundary — if the adapter cannot be loaded, harness_execute emits an ExecutionLog with status=adapter_unavailable and does not invoke any node
  - Lineage preservation — every ExecutionLog cites the source WorkGraph ID, the adapter identifier, and the timestamp of invocation; every per-node execution record cites the WorkGraphNode ID being executed
  - Determinism scoped to plan generation, not execution outcome — given identical WorkGraph and identical adapter, harness_execute produces an identical execution plan (node order, dispatch sequence); the outcomes of individual node executions are inherently stateful and not required to be deterministic across runs
  - Narrow-function discipline — harness_execute dispatches and records; it does not compute trust signals (Stage 7), does not propagate incidents (assurance-graph), does not transition Function lifecycle state (state machine in runtime)
  - Schema conformance — the emitted ExecutionLog validates against the ExecutionLog Zod schema in packages/schemas/src/execution.ts (schema to be added in the paired PR per the Schema additions required section below)

candidateInvariants:
  - A WorkGraph whose Gate 1 Coverage Report cited overall=fail is never passed to harness_execute by the Factory's own machinery
  - Every ExecutionLog's per-node records cover exactly the set of WorkGraphNodes in the source WorkGraph
  - Every ExecutionLog is written to disk before harness_execute returns, even on adapter failure
  - An ExecutionLog with adapter_unavailable status has an empty per-node records array

successSignals:
  - First successful execution of WG-META-GATE-1-COMPILE-COVERAGE via the dry-run adapter, producing an ExecutionLog with all per-node statuses populated
  - ExecutionLog schema-validation rate at 100% across the Factory's operational lifetime
  - Adapter-unavailable rate below 1% quarterly (harness_execute's own observability signal)

confidence: 0.75
