summary: >
  The PRD's conceptual frame (assemble WorkGraph from compiler
  intermediates) is correct. The implementation is correct. The
  pass numbering diverges from §3's narrative: §3 counts eight named
  activities, the implementation 0-indexes and inserts Gate 1 as a
  discrete ninth pass. A citation error attributes Function types to
